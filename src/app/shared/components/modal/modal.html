@if (open()) {
  <div class="modal__backdrop" (click)="onBackdrop()">
    <div
      class="modal__panel"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="title()"
      [style.max-width]="maxWidth()"
      (click)="$event.stopPropagation()"
    >
      <header class="modal__header" [class.modal__header--primary]="headerVariant() === 'primary'">
        <div class="modal__titles">
          <h2 class="modal__title">{{ title() }}</h2>
          @if (subtitle()) {
            <p class="modal__subtitle">{{ subtitle() }}</p>
          }
        </div>
        <button type="button" class="modal__close" (click)="close()" aria-label="Cerrar">
          <span class="material-icons" aria-hidden="true">close</span>
        </button>
      </header>

      <div class="modal__body" [class.modal__body--no-padding]="noPadding()">
        <ng-content></ng-content>
      </div>

      <footer class="modal__footer">
        <ng-content select="[modal-footer]"></ng-content>
      </footer>
    </div>
  </div>
}
