<button
  [type]="type()"
  class="ui-btn"
  [class.ui-btn--primary]="variant() === 'primary'"
  [class.ui-btn--outline]="variant() === 'outline'"
  [class.ui-btn--ghost]="variant() === 'ghost'"
  [class.ui-btn--danger]="variant() === 'danger'"
  [class.ui-btn--sm]="size() === 'sm'"
  [class.ui-btn--icon-only]="iconOnly()"
  [disabled]="disabled() || loading()"
  [attr.aria-label]="ariaLabel() || label() || null"
  [attr.aria-busy]="loading() ? 'true' : null"
  (click)="onClick()"
>
  @if (loading()) {
    <span class="material-icons ui-btn__spinner" aria-hidden="true">progress_activity</span>
  } @else if (icon()) {
    <span class="material-icons ui-btn__icon" aria-hidden="true">{{ icon() }}</span>
  }

  @if (!iconOnly() && label()) {
    <span class="ui-btn__label">{{ label() }}</span>
  }
</button>
