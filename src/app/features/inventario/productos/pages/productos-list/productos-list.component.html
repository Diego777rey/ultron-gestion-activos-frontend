<app-generic-list
  [columns]="columns"
  [data]="productos()"
  [loading]="loading()"
  [error]="error()"
  [total]="totalElements()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[15, 25, 50, 100]"
  searchLabel="Buscar por nombre o código..."
  [searchValue]="search()"
  (searchValueChange)="search.set($event)"
  [toolbarActions]="toolbarActions"
  emptyMessage="No hay productos que coincidan con la búsqueda"
  [trackBy]="trackById"
  (pageChange)="onPageChange($event)"
  (retry)="load()"
  (actionClicked)="onToolbarAction($event)"
  (searchSubmit)="pageIndex.set(0); load()"
>
  <ng-template appTableCell="codigo" [appTableCellFrom]="productos()" let-producto>
    {{ producto.codigo | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="nombre" [appTableCellFrom]="productos()" let-producto>
    {{ producto.nombre | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="precioVenta" [appTableCellFrom]="productos()" let-producto>
    {{ producto.precioVenta | number:'1.0-0' | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="stock" [appTableCellFrom]="productos()" let-producto>
    {{ producto.stock | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="categoria" [appTableCellFrom]="productos()" let-producto>
    {{ producto.categoriaProducto?.nombre | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="acciones" [appTableCellFrom]="productos()" let-producto>
    <app-action-menu [actions]="rowActions" (actionSelected)="onRowAction($event, producto)" />
  </ng-template>
</app-generic-list>
