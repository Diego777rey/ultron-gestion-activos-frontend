<app-generic-list
  [columns]="columns"
  [data]="presentaciones()"
  [loading]="loading()"
  [error]="error()"
  [total]="totalElements()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[15, 25, 50, 100]"
  searchLabel="Buscar presentación por nombre..."
  [searchValue]="search()"
  (searchValueChange)="search.set($event)"
  [toolbarActions]="toolbarActions"
  emptyMessage="No hay presentaciones registradas"
  [trackBy]="trackById"
  (pageChange)="onPageChange($event)"
  (retry)="load()"
  (actionClicked)="onToolbarAction($event)"
  (searchSubmit)="pageIndex.set(0); load()"
>
  <ng-template appTableCell="nombre" [appTableCellFrom]="presentaciones()" let-item>
    {{ item.nombre | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="descripcion" [appTableCellFrom]="presentaciones()" let-item>
    {{ item.descripcion | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="estado" [appTableCellFrom]="presentaciones()" let-item>
    {{ item.estado ? 'Activo' : 'Inactivo' }}
  </ng-template>

  <ng-template appTableCell="acciones" [appTableCellFrom]="presentaciones()" let-item>
    <app-action-menu [actions]="rowActions" (actionSelected)="onRowAction($event, item)" />
  </ng-template>
</app-generic-list>
