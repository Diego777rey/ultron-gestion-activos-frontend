@if (error) {
  <div class="producto-form__error" role="alert">
    <span class="material-icons" aria-hidden="true">error_outline</span>
    <span>{{ error }}</span>
  </div>
}

<form class="producto-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="producto-form__grid">
    <div class="field">
      <input id="codigo" class="field__input" type="text" formControlName="codigo" appAutofocus appUppercase placeholder=" " />
      <label class="field__label" for="codigo">Código*</label>
      @if (form.controls.codigo.touched && form.controls.codigo.invalid) {
        <span class="field__error">El código es obligatorio</span>
      }
    </div>

    <div class="field">
      <input id="nombre" class="field__input" type="text" formControlName="nombre" appUppercase placeholder=" " />
      <label class="field__label" for="nombre">Nombre*</label>
      @if (form.controls.nombre.touched && form.controls.nombre.invalid) {
        <span class="field__error">El nombre es obligatorio</span>
      }
    </div>

    <app-entity-searcher
      [items]="categoriasDisponibles()"
      [value]="form.controls.idCategoriaRaiz.value || null"
      (itemChange)="onCategoriaSelected($event)"
      [displayFn]="categoriaLabelFn"
      [keyFn]="categoriaKeyFn"
      [columns]="categoriaColumns"
      [loading]="loadingCategorias()"
      label="Categoría*"
      searchPlaceholder="Ingresar texto"
      [error]="form.controls.idCategoriaRaiz.touched && form.controls.idCategoriaRaiz.invalid"
      errorText="Selecciona una categoría válida"
    />

    <app-entity-searcher
      [items]="subcategoriasDisponibles()"
      [value]="form.controls.idSubcategoria.value || null"
      (itemChange)="onSubcategoriaSelected($event)"
      [displayFn]="subcategoriaLabelFn"
      [keyFn]="subcategoriaKeyFn"
      [columns]="categoriaColumns"
      [loading]="loadingSubcategorias()"
      [disabled]="!form.controls.idCategoriaRaiz.value"
      label="Subcategoría"
      searchPlaceholder="Ingresar texto"
    />

    <div class="field field--full">
      <input id="descripcion" class="field__input" type="text" formControlName="descripcion" appUppercase placeholder=" " />
      <label class="field__label" for="descripcion">Descripción / Notas</label>
    </div>
  </div>
</form>

<div class="producto-form-footer">
  <app-ui-button
    [label]="isEdit ? 'Guardar Cambios' : 'Registrar Producto'"
    icon="save"
    variant="primary"
    [loading]="saving"
    (clicked)="onSubmit()"
  />
</div>
