@if (error) {
  <div class="form-error" role="alert">
    <span class="material-icons" aria-hidden="true">error_outline</span>
    <span>{{ error }}</span>
  </div>
}

<form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="form__grid">
    <div class="field field--span-2">
      <input id="pres-descripcion" class="field__input" type="text" formControlName="descripcion" appAutofocus appUppercase placeholder=" " />
      <label class="field__label" for="pres-descripcion">Descripción (ej: UNIDAD, PACK X 12)*</label>
      @if (form.controls.descripcion.touched && form.controls.descripcion.invalid) {
        <span class="field__error">La descripción es obligatoria</span>
      }
    </div>

    <div class="field">
      <select id="pres-tipo" class="field__input" formControlName="tipo">
        @for (t of tipos; track t) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
      <label class="field__label" for="pres-tipo">Tipo*</label>
    </div>

    <div class="field">
      <input id="pres-cantidad" class="field__input" type="number" formControlName="cantidad" placeholder=" " />
      <label class="field__label" for="pres-cantidad">Cantidad (unidades)*</label>
    </div>

    <div class="field">
      <input id="pres-precio" class="field__input" type="number" formControlName="precio" placeholder=" " />
      <label class="field__label" for="pres-precio">Precio de venta*</label>
      @if (form.controls.precio.touched && form.controls.precio.invalid) {
        <span class="field__error">Precio válido requerido</span>
      }
    </div>

    <div class="field">
      <input id="pres-codigo" class="field__input" type="text" formControlName="codigoBarras" appUppercase placeholder=" " />
      <label class="field__label" for="pres-codigo">Código de barras</label>
    </div>

    <div class="field field--checkbox">
      <label class="checkbox-label">
        <input type="checkbox" formControlName="principal" />
        Presentación principal
      </label>
    </div>

    <div class="field field--checkbox">
      <label class="checkbox-label">
        <input type="checkbox" formControlName="estado" />
        Activa
      </label>
    </div>
  </div>
</form>

<div class="form-footer">
  <app-ui-button
    [label]="isEdit ? 'Guardar Cambios' : 'Agregar Presentación'"
    icon="save"
    variant="primary"
    [loading]="saving"
    (clicked)="onSubmit()"
  />
</div>
