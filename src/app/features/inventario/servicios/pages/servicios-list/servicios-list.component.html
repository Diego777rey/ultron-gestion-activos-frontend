<app-generic-list
  [columns]="columns"
  [data]="servicios()"
  [loading]="loading()"
  [error]="error()"
  [total]="totalElements()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[15, 25, 50, 100]"
  searchLabel="Buscar por nombre o código..."
  [searchValue]="search()"
  (searchValueChange)="search.set($event)"
  [toolbarActions]="toolbarActions"
  emptyMessage="No hay servicios que coincidan con la búsqueda"
  [trackBy]="trackById"
  (pageChange)="onPageChange($event)"
  (retry)="load()"
  (actionClicked)="onToolbarAction($event)"
  (searchSubmit)="pageIndex.set(0); load()"
>
  <ng-template appTableCell="codigo" [appTableCellFrom]="servicios()" let-servicio>
    {{ servicio.codigo | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="nombre" [appTableCellFrom]="servicios()" let-servicio>
    {{ servicio.nombre | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="precio" [appTableCellFrom]="servicios()" let-servicio>
    {{ servicio.precio | number:'1.0-0' | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="categoria" [appTableCellFrom]="servicios()" let-servicio>
    {{ categoriaLabel(servicio) | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="acciones" [appTableCellFrom]="servicios()" let-servicio>
    <app-action-menu [actions]="rowActions" (actionSelected)="onRowAction($event, servicio)" />
  </ng-template>
</app-generic-list>
