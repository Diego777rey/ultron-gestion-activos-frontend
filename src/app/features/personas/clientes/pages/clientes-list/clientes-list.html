<app-generic-list
  [columns]="columns"
  [data]="clientes()"
  [loading]="loading()"
  [error]="error()"
  [total]="totalElements()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[15, 25, 50, 100]"
  searchLabel="Nombre, código o documento"
  [searchValue]="search()"
  (searchValueChange)="search.set($event)"
  [toolbarActions]="toolbarActions"
  emptyMessage="No hay clientes que coincidan con la búsqueda"
  [trackBy]="trackById"
  (pageChange)="onPageChange($event)"
  (retry)="load()"
  (actionClicked)="onToolbarAction($event)"
  (searchSubmit)="pageIndex.set(0); load()"
>
  <ng-template appTableCell="id" [appTableCellFrom]="clientes()" let-cliente>
    {{ cliente.id_cliente }}
  </ng-template>

  <ng-template appTableCell="nombre" [appTableCellFrom]="clientes()" let-cliente>
    {{ fullName(cliente) }}
  </ng-template>

  <ng-template appTableCell="direccion" [appTableCellFrom]="clientes()" let-cliente>
    {{ $safeNavigationMigration(cliente.persona?.direccion) | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="telefono" [appTableCellFrom]="clientes()" let-cliente>
    {{ $safeNavigationMigration(cliente.persona?.telefono) | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="email" [appTableCellFrom]="clientes()" let-cliente>
    {{ $safeNavigationMigration(cliente.persona?.email) | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="acciones" [appTableCellFrom]="clientes()" let-cliente>
    <app-action-menu [actions]="rowActions" (actionSelected)="onRowAction($event, cliente)" />
  </ng-template>
</app-generic-list>
