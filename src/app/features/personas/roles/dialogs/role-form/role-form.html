@if (error) {
  <div class="role-form__error" role="alert">
    <span class="material-icons" aria-hidden="true">error_outline</span>
    <span>{{ error }}</span>
  </div>
}

<form class="role-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="role-form__grid">
    <div class="field field--full">
      <input id="descripcion" class="field__input" type="text" formControlName="descripcion" appAutofocus placeholder=" " />
      <label class="field__label" for="descripcion">Descripción**</label>
      @if (form.controls.descripcion.touched && form.controls.descripcion.invalid) {
        <span class="field__error">La descripción es obligatoria</span>
      }
    </div>

    <div class="field">
      <select id="activo" class="field__input" formControlName="activo">
        @for (estado of estados; track estado) {
          <option [value]="estado">{{ estado }}</option>
        }
      </select>
      <label class="field__label" for="activo">Estado*</label>
    </div>
  </div>
</form>

<div class="role-form-footer">
  <app-ui-button
    [label]="isEdit ? 'Guardar Cambios' : 'Registrar Rol'"
    icon="save"
    variant="primary"
    [loading]="saving"
    (clicked)="onSubmit()"
  />
</div>
