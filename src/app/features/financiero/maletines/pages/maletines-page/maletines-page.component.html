<app-generic-list
  [columns]="columns"
  [data]="maletines()"
  [loading]="loading()"
  [error]="error()"
  [total]="totalElements()"
  [pageIndex]="pageIndex()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[15, 25, 50, 100]"
  searchLabel="Buscar maletín por nombre..."
  [searchValue]="search()"
  (searchValueChange)="search.set($event)"
  [toolbarActions]="toolbarActions"
  emptyMessage="No hay maletines registrados"
  [trackBy]="trackById"
  (pageChange)="onPageChange($event)"
  (retry)="load()"
  (actionClicked)="onToolbarAction($event)"
  (searchSubmit)="pageIndex.set(0); load()"
>
  <ng-template appTableCell="nombre" [appTableCellFrom]="maletines()" let-item>
    {{ item.nombre | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="estado" [appTableCellFrom]="maletines()" let-item>
    <span class="estado-pill" [class.estado-pill--abierto]="item.estado === 'ABIERTO'">
      {{ item.estado | defaultEmpty }}
    </span>
  </ng-template>

  <ng-template appTableCell="balancePyg" [appTableCellFrom]="maletines()" let-item>
    {{ item.balancePyg | number: '1.0-0' | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="balanceUsd" [appTableCellFrom]="maletines()" let-item>
    {{ item.balanceUsd | number: '1.2-2' | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="balanceBrl" [appTableCellFrom]="maletines()" let-item>
    {{ item.balanceBrl | number: '1.2-2' | defaultEmpty }}
  </ng-template>

  <ng-template appTableCell="activo" [appTableCellFrom]="maletines()" let-item>
    {{ item.activo ? 'Sí' : 'No' }}
  </ng-template>

  <ng-template appTableCell="acciones" [appTableCellFrom]="maletines()" let-item>
    <app-action-menu [actions]="rowActions" (actionSelected)="onRowAction($event, item)" />
  </ng-template>
</app-generic-list>
