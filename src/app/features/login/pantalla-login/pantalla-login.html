<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="icon-circle">
                <span class="material-icons">engineering</span>
            </div>
            <h2>Bienvenido</h2>
        </div>

        <form class="login-form">
            <div class="form-group">
                <label for="usuario">Usuario*</label>
                <div class="input-container">
                    <span class="material-icons prefix-icon">person</span>
                    <input type="text" id="usuario" placeholder="Usuario*" class="error-input" />
                </div>
                <span class="error-text">
                    <span class="material-icons error-icon">warning</span> El usuario es obligatorio
                </span>
            </div>

            <div class="form-group">
                <label for="contrasena">Contraseña*</label>
                <div class="input-container">
                    <span class="material-icons prefix-icon">lock</span>
                    <input type="password" id="contrasena" placeholder="---" />
                    <span class="material-icons suffix-icon">visibility_off</span>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="button" class="btn-primary">INGRESAR</button>
            <button type="button" class="btn-secondary">SALIR</button>
        </form>
    </div>
</div>
