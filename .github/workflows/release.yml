name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Versionado semantico
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ejecutar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TYPE: npm
        run: bash .github/scripts/release.sh
